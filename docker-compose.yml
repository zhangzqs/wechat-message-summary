services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: wechat
      POSTGRES_PASSWORD: wechat
      POSTGRES_DB: wechat_messages
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wechat -d wechat_messages"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  # ---- NATS Server (JetStream) ----
  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    ports:
      - "4222:4222"   # 客户端连接
      - "8222:8222"   # HTTP 监控
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 3s

  # ---- NATS Stream 初始化 (一次性任务) ----
  nats-init:
    image: natsio/nats-box:latest
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
    volumes:
      - ./nats/init-stream.sh:/init-stream.sh:ro
    entrypoint: ["sh", "/init-stream.sh"]
    restart: "no"

  # ---- Go 后端服务 ----
  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"   # MCP Server
    volumes:
      - ./backend-go/config.docker.yaml:/app/config.yaml:ro
    restart: unless-stopped

volumes:
  pg-data:
  nats-data:
