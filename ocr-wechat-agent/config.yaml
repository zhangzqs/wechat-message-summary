logger:
  level: DEBUG
  filename: ocr-wechat-agent.log

nats_url: nats://192.168.242.241:4222

# 轮询间隔（秒），建议 1~3 秒
poll_interval: 1.5

# OCR 裁剪区域（窗口高度的相对比例），裁掉顶部导航栏
# top_pct=0.12 表示从窗口高度 12% 处开始截取，去掉标题栏+搜索栏
message_area_top_pct: 0.12

# 主微信窗口左侧边栏宽度占比（fallback 模式下用于裁掉会话列表区域）
# 若独立弹出聊天窗口已关闭，程序会自动切换到主窗口 fallback
sidebar_width_pct: 0.27

# 锚定行数：用于定位上一次扫描末尾，以判断新消息
anchor_lines: 4

# 每次最多上报的新消息行数（防止初次启动时大量刷入）
max_new_lines_per_poll: 20

chat_transfer_config:
  - chat: "文件传输助手"
    subject: "wxauto.messages"
  - chat: "有福同享（新年版👑）"
    subject: "wxauto.messages"
